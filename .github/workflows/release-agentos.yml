name: Release AgentOS

on:
  push:
    tags:
      - "agentos-v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Run release consistency check
        shell: bash
        run: node packages/agentos/scripts/check-release-consistency.mjs

      - id: package
        shell: bash
        run: |
          echo "version=$(node -p "require('./packages/agentos/package.json').version")" >> "$GITHUB_OUTPUT"

      - id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#agentos-v}"

          if [ "$VERSION" = "$TAG" ]; then
            echo "Unexpected tag format: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag matches package version
        shell: bash
        run: |
          if [ "${{ steps.package.outputs.version }}" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Tag version (${{ steps.tag.outputs.version }}) does not match packages/agentos/package.json (${{ steps.package.outputs.version }})." >&2
            exit 1
          fi

  build-release-assets:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: windows-latest
            platform: win32
            arch: x64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
          - runner: macos-14
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm-cache
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack AgentOS release asset
        shell: bash
        env:
          AGENTOS_VERSION: ${{ needs.validate-release.outputs.version }}
          AGENTOS_PLATFORM: ${{ matrix.platform }}
          AGENTOS_ARCH: ${{ matrix.arch }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          fs.rmSync("dist", { recursive: true, force: true });
          fs.mkdirSync("dist", { recursive: true });
          EOF

          npm pack ./packages/agentos --pack-destination dist

          node <<'EOF'
          const fs = require("node:fs");
          const path = require("node:path");

          const distDir = path.join(process.cwd(), "dist");
          const tarballs = fs
            .readdirSync(distDir)
            .filter((fileName) => fileName.endsWith(".tgz"))
            .sort();

          if (tarballs.length !== 1) {
            throw new Error(`Expected exactly one tarball in ${distDir}, found ${tarballs.length}.`);
          }

          const sourcePath = path.join(distDir, tarballs[0]);
          const versionedName =
            `agentos-${process.env.AGENTOS_VERSION}-${process.env.AGENTOS_PLATFORM}-${process.env.AGENTOS_ARCH}.tgz`;
          const stableName = `agentos-${process.env.AGENTOS_PLATFORM}-${process.env.AGENTOS_ARCH}.tgz`;
          const versionedPath = path.join(distDir, versionedName);
          const stablePath = path.join(distDir, stableName);

          fs.renameSync(sourcePath, versionedPath);
          fs.copyFileSync(versionedPath, stablePath);
          EOF

      - name: Create SHA-256 checksums
        shell: bash
        run: |
          node <<'EOF'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");

          for (const fileName of fs.readdirSync("dist")) {
            if (!fileName.endsWith(".tgz")) {
              continue;
            }

            const filePath = path.join("dist", fileName);
            const digest = crypto.createHash("sha256").update(fs.readFileSync(filePath)).digest("hex");
            fs.writeFileSync(`${filePath}.sha256`, `${digest}  ${fileName}\n`);
          }
          EOF

      - uses: actions/upload-artifact@v6
        with:
          name: agentos-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  create-release:
    needs:
      - validate-release
      - build-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          pattern: agentos-*
          merge-multiple: true
          path: release-assets

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## Install

          macOS / Linux:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/SapienXai/AgentOS/main/install.sh | bash
          \`\`\`

          Windows PowerShell:

          \`\`\`powershell
          iwr https://raw.githubusercontent.com/SapienXai/AgentOS/main/install.ps1 | iex
          \`\`\`

          Specific version:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/SapienXai/AgentOS/main/install.sh | AGENTOS_VERSION=${{ needs.validate-release.outputs.version }} bash
          \`\`\`

          \`\`\`powershell
          \$env:AGENTOS_VERSION='${{ needs.validate-release.outputs.version }}'; iwr https://raw.githubusercontent.com/SapienXai/AgentOS/main/install.ps1 | iex
          \`\`\`

          ## Included assets

          - \`agentos-darwin-arm64.tgz\`
          - \`agentos-darwin-x64.tgz\`
          - \`agentos-linux-x64.tgz\`
          - \`agentos-win32-x64.tgz\`
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          name: AgentOS ${{ needs.validate-release.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            install.sh
            install.ps1
            release-assets/*
